name: FractalLab
options:
  bundleIdPrefix: com.fractallab
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

targets:
  FractalLab:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FractalLab
        excludes:
          - "Resources/Assets.xcassets"
      - path: FractalLab/Resources/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fractallab.FractalLab
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: FractalLab/Resources/FractalLab-Bridging-Header.h
        INFOPLIST_FILE: FractalLab/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          MTL_ENABLE_DEBUG_INFO: NO
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    info:
      path: FractalLab/Resources/Info.plist
