name: Build & Deploy FractalLab Web

on:
  push:
    branches: [main]
    paths:
      - 'FractalLab/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:   # always allows a manual run from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FractalLab/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # npm install (not ci) because there is no package-lock.json in the repo
        run: npm install

      - name: Build
        env:
          # Set base path to /<repo-name>/ for GitHub Pages project sites.
          # Change to '/' if you use a custom domain or user/org Pages root.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: FractalLab/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
